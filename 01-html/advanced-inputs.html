<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Inputs</title>
</head>
<body>
    <main>
        <form action="#" method="post" enctype="multipart/form-data">
            <h1>User Information</h1>
            <label for="full_name">Full Name</label>
            <input id="full_name" name="full_name" type="text" placeholder="Enter your full name" required>
            <br>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" value="istiyakemon24@gmail.com" readonly>
            <br>
            <label for="membership">Membership Plan</label>
            <input id="membership" name="membership" type="text" value="Free Plan" disabled>
            <br>
            <h2>Upload Documents</h2>
            <label for="file_upload">Upload PDF Documents</label>
            <input id="file_upload" name="file_upload[]" type="file" accept=".pdf" multiple>
            <br>
            <button type="submit">Submit</button>
        </form>
    </main>
</body>
</html>
