<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <section>
        <form action="#" method="post">
            <h1>Personal Information</h1>
            <label for="full_name">Full Name</label>
            <input id="full_name" name="full_name" type="text" placeholder="Enter your full name" required>
            <br>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="Enter your email address" required>
            <br>
            <h2>Gender</h2>
            <input id="male" name="gender" type="radio" value="male">
            <label for="male">Male</label>
            <br>
            <input id="female" name="gender" type="radio" value="female">
            <label for="female">Female</label>
            <br>
            <input id="other" name="gender" type="radio" value="other">
            <label for="other">Other</label>
            <br>
            <h2>Skills</h2>
            <input id="html" name="skills[]" type="checkbox" value="html">
            <label for="html">HTML</label>
            <br>
            <input id="css" name="skills[]" type="checkbox" value="css">
            <label for="css">CSS</label>
            <br>
            <input id="javascript" name="skills[]" type="checkbox" value="javascript">
            <label for="javascript">JavaScript</label>
            <br>
            <input id="php" name="skills[]" type="checkbox" value="php">
            <label for="php">PHP</label>
            <br>
            <button type="submit">Submit</button>
        </form>
    </section>
</body>
</html>
