<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My Portfolio Website">
    <title>My Portfolio</title>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
            </ul> 
        </nav>
    </header>
    <main>
        <!-- Hero -->
        <section>
            <h1>Welcome to my website</h1>
        </section>
        <!-- About -->
        <section>
            <h2>About Me</h2>
            <p>I'm learning HTML.</p>
        </section>
        <!-- Services -->
        <section>
            <h2>My Skills</h2>
            <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            </ul>
        </section>
        <!-- Contact -->
        <section>
            <h2>Contact Me</h2>
            <form action="#" method="post">
            <label for="name">Name</label>
            <input name="name" id="name" required type="text" placeholder="Enter your name">
            <br>
            <label for="email">Email</label>
            <input name="email" id="email" required type="email" placeholder="Enter your email">
            <br>
            <label for="message">Message</label>
            <textarea name="message" id="message" required placeholder="Write your message"></textarea>
            <br>
            <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <!-- Footer -->
    <footer>
        <p>&copy; 2026 My Portfolio</p>
    </footer>
</body>
</html>
