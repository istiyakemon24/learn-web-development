
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Upload Form</title>
</head>
<body>
    <form action="#" method="post" enctype="multipart/form-data">
        <h1>Profile Upload Form</h1>
        <label for="full_name">Full Name</label>
        <input id="full_name" name="full_name" type="text" placeholder="Enter your full name" required>
        <br>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Enter your email address" required>
        <br>
        <label for="profile_picture">Profile Picture</label>
        <input id="profile_picture" name="profile_picture" type="file" accept="image/*" required>
        <br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
