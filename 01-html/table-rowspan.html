<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Rowspan</title>
</head>
<body>
    <main>
        <table border="1">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Item</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td rowspan="3">Fruits</td>
                    <td>Apple</td>
                </tr>
                <tr>
                    <td>Mango</td>
                </tr>
                <tr>
                    <td>Banana</td>
                </tr>
                <tr>
                    <td rowspan="2">Drinks</td>
                    <td>Water</td>
                </tr>
                <tr>
                    <td>Juice</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
